version: "3.8"

services:
  orgnizador:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orgnizador
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - orgnizador_data:/app/data
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/orgnizador.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30000000000s
      timeout: 10000000000s
      retries: 3
      start_period: 30000000000s

volumes:
  orgnizador_data:
    driver: local
